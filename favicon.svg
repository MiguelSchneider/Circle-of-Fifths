<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <!-- 12 nodes around the circle like a clock -->
  <g fill="#7c3aed">
    <circle cx="32" cy="6" r="3.5"/>
    <circle cx="45" cy="8.5" r="3"/>
    <circle cx="53.5" cy="19" r="3"/>
    <circle cx="56" cy="32" r="3"/>
    <circle cx="53.5" cy="45" r="3"/>
    <circle cx="45" cy="53.5" r="3"/>
    <circle cx="32" cy="56" r="3"/>
    <circle cx="19" cy="53.5" r="3"/>
    <circle cx="10.5" cy="45" r="3"/>
    <circle cx="8" cy="32" r="3"/>
    <circle cx="10.5" cy="19" r="3"/>
    <circle cx="19" cy="8.5" r="3"/>
  </g>
  <!-- Inner minor circle nodes -->
  <g fill="#a78bfa" opacity="0.7">
    <circle cx="32" cy="14" r="2"/>
    <circle cx="41" cy="16" r="2"/>
    <circle cx="46" cy="23" r="2"/>
    <circle cx="48" cy="32" r="2"/>
    <circle cx="46" cy="41" r="2"/>
    <circle cx="41" cy="46" r="2"/>
    <circle cx="32" cy="48" r="2"/>
    <circle cx="23" cy="46" r="2"/>
    <circle cx="18" cy="41" r="2"/>
    <circle cx="16" cy="32" r="2"/>
    <circle cx="18" cy="23" r="2"/>
    <circle cx="23" cy="16" r="2"/>
  </g>
  <!-- Center accent -->
  <circle cx="32" cy="32" r="5" fill="#7c3aed" opacity="0.3"/>
</svg>
